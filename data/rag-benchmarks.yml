  hypothesis_verdicts:
    H1_reasoning_floor:
      verdict: "CONFIRMED"
      evidence: "All models <1.5B scored ≤0.04 (qwen:0.5b, tinyllama). Models ≥3.8B scored ≥0.11 except Qwen family which plateaued at 0.03 across all sizes."
      
    H2_size_vs_quant:
      verdict: "REFUTED"
      evidence: "llama3:8b-instruct-q4_K_M (0.41) outperformed llama3:latest (0.26) by 58%. Quantization did NOT degrade performance - it improved it."
      
    H3_family:
      verdict: "CONFIRMED"
      evidence: "Qwen family (0.5b, 1.8b, 4b) all scored 0.03 regardless of size - clear family ceiling. Llama3 and Phi3 families achieved 0.26-0.41."
      
    H4_governance_boost:
      verdict: "NOT_TESTED"
      evidence: "This phase tested baseline (no governance injection). Governance variants deferred to Phase 3."
