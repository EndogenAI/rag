name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and pull requests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "This issue has been inactive for 60 days and has been marked as stale. If it is still relevant, please comment or remove the stale label."
          stale-pr-message: "This PR has been inactive for 60 days and has been marked as stale. If still active, please comment or remove the stale label."
          close-issue-message: "This issue has been automatically closed after 74 days of inactivity (60 days to stale + 14 days to close). Please reopen if still needed."
          close-pr-message: "This PR has been automatically closed after 37 days of inactivity (30 days to stale + 7 days to close). Please reopen if still needed."
          days-before-stale: 60
          days-before-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          exempt-issue-labels: "priority:critical,priority:high,status:blocked"
          exempt-pr-labels: "priority:critical,priority:high,status:blocked,status:needs-review"
          # NOTE: The stale-issue-label and stale-pr-label below use "status:stale".
          # This label must be present in data/labels.yml before this workflow is merged.
          stale-issue-label: "status:stale"
          stale-pr-label: "status:stale"
