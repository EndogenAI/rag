name: Release dogma-governance package

on:
  push:
    tags:
      - 'packages/dogma-governance/v*'
  pull_request:
    paths:
      - 'packages/dogma-governance/**'

jobs:
  test:
    name: Run package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package in editable mode with dev deps
        working-directory: packages/dogma-governance
        run: pip install -e ".[dev]"

      - name: Run package tests
        working-directory: packages/dogma-governance
        run: pytest tests/ -q --tb=short

  release:
    name: Build and publish to PyPI
    needs: test
    # Only publish on tag pushes, not PRs
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publisher

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hatchling
        run: pip install hatchling

      - name: Build wheel and sdist
        working-directory: packages/dogma-governance
        run: python -m hatchling build

      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/dogma-governance/dist/
