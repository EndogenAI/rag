name: Release Changelog Builder

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-changelog:
    name: Build release changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          outputFile: RELEASE_CHANGELOG.md
          exportCache: .cache/pr-changelog-cache.json
          fetchReviewers: false
          fetchReleaseInformation: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(release): update release changelog for ${{ github.ref_name }}'
          file_pattern: 'RELEASE_CHANGELOG.md .cache/pr-changelog-cache.json'
