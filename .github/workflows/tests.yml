name: Tests

on:
  push:
    branches:
      - main
      - feat/**
      - sprint/**
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run pytest with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Run pytest with coverage
        run: uv run pytest tests/ --cov=scripts --cov=mcp_server --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-3.11
          fail_ci_if_error: false

  lint:
    name: Lint code style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff
        run: uv run ruff check scripts/ tests/

      - name: Run validate_synthesis
        run: |
          for f in docs/research/*.md; do
            base="$(basename "$f")"
            [ "$base" = "OPEN_RESEARCH.md" ] && continue
            [ "$base" = "README.md" ] && continue
            uv run python3 scripts/validate_synthesis.py "$f"
          done

      - name: Run validate_agent_files
        run: |
          for f in .github/agents/*.agent.md; do
            uv run python3 scripts/validate_agent_files.py "$f"
          done

      - name: Run validate_agent_files (skills)
        run: |
          if compgen -G ".github/skills/*/SKILL.md" > /dev/null 2>&1; then
            uv run python3 scripts/validate_agent_files.py --skills
          fi

      - name: Substrate CRD health check
        run: uv run python scripts/check_substrate_health.py

      - name: Check value-encoding drift
        run: uv run python scripts/detect_drift.py --agents-dir .github/agents/ --fail-below 0.1 --format summary

      - name: Validate phase-gate FSM
        run: uv run python scripts/parse_fsm_to_graph.py --validate

      - name: Run ruff format (check)
        run: uv run ruff format --check scripts/ tests/

      - name: Enforce PR body auto-close syntax
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: uv run python scripts/check_pr_closes.py --body "$PR_BODY"

  retrieval-smoke:
    name: Retrieval smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build retrieval index and capture artifact
        run: >-
          uv run python -c 'import json, pathlib, subprocess; out_dir=pathlib.Path("smoke-artifacts"); out_dir.mkdir(parents=True, exist_ok=True); cmd=["uv","run","python","scripts/rag_index.py","reindex","--scope","full","--output","json"]; result=subprocess.run(cmd, capture_output=True, text=True); result.check_returncode(); payload=json.loads(result.stdout); (out_dir / "reindex.json").write_text(json.dumps(payload, indent=2), encoding="utf-8"); print("Reindex completed: total_chunks=" + str(payload.get("total_chunks")))'

      - name: Validate retrieval query returns at least one result
        run: >-
          uv run python -c 'import json, pathlib, subprocess; out_dir=pathlib.Path("smoke-artifacts"); cmd=["uv","run","python","scripts/rag_index.py","query","--query","governing axiom","--top-k","3","--output","json"]; result=subprocess.run(cmd, capture_output=True, text=True); result.check_returncode(); payload=json.loads(result.stdout); (out_dir / "query.json").write_text(json.dumps(payload, indent=2), encoding="utf-8"); count=int(payload.get("count",0)); assert count >= 1, "Retrieval smoke failed: expected >=1 query result, got " + str(count)'

      - name: Validate retrieval status health signal
        run: >-
          uv run python -c 'import json, pathlib, subprocess; out_dir=pathlib.Path("smoke-artifacts"); cmd=["uv","run","python","scripts/rag_index.py","status","--freshness-seconds","3600","--output","json"]; result=subprocess.run(cmd, capture_output=True, text=True); result.check_returncode(); payload=json.loads(result.stdout); (out_dir / "status.json").write_text(json.dumps(payload, indent=2), encoding="utf-8"); exists=bool(payload.get("exists")); fresh=bool(payload.get("is_fresh")); version_ok=bool(payload.get("version_ok")); chunks=int(payload.get("total_chunks",0)); assert exists, "Retrieval smoke failed: index does not exist after reindex"; assert version_ok, "Retrieval smoke failed: index version mismatch"; assert fresh, "Retrieval smoke failed: index is stale after reindex"; assert chunks > 0, "Retrieval smoke failed: expected total_chunks > 0, got " + str(chunks)'

      - name: Upload retrieval smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-smoke-${{ github.run_id }}
          path: smoke-artifacts/*.json
          if-no-files-found: error

  links:
    name: Check links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: latest
          args: --no-progress --exclude-loopback --accept 200,403,429,502 docs/**/*.md README.md CHANGELOG.md CONTRIBUTING.md
          fail: false

  required:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [test, lint, retrieval-smoke]
    if: always()
    steps:
      - name: Decide whether all tests and checks passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.retrieval-smoke.result }}" != "success" ]; then
            echo "One or more required checks failed: test=${{ needs.test.result }}, lint=${{ needs.lint.result }}, retrieval-smoke=${{ needs.retrieval-smoke.result }}"
            exit 1
          fi
