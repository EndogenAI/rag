[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dogma-governance"
version = "0.1.0"
description = "Standalone governance validators extracted from the dogma template repo"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
dogma-validate-agent = "dogma_governance.validate_agent:main"
dogma-validate-synthesis = "dogma_governance.validate_synthesis:main"
dogma-check-health = "dogma_governance.check_health:main"
dogma-detect-drift = "dogma_governance.detect_drift:main"

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-mock>=3",
    "pytest-cov>=4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["dogma_governance"]
