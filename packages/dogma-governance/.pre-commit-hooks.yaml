- id: validate-agent-files
  name: Validate agent files
  entry: dogma-validate-agent
  language: python
  files: \.agent\.md$
  pass_filenames: true

- id: validate-synthesis
  name: Validate D4 synthesis documents
  entry: dogma-validate-synthesis
  language: python
  types: [markdown]
  files: ^docs/research/
  exclude: ^docs/research/(OPEN_RESEARCH\.md|README\.md|.+/README\.md|sources/)
  pass_filenames: true

- id: detect-drift
  name: Check value-encoding drift in agent files
  entry: dogma-detect-drift
  language: python
  args: [--format, summary, --fail-below, "0.1"]
  files: \.agent\.md$
  pass_filenames: false

- id: no-heredoc-writes
  name: Block heredoc file-write commands
  language: pygrep
  entry: 'cat\s+>{1,2}\s+\S+\s+<<|<<\s+[''"]?(EOF|PYEOF|HEREDOC)[''"]?'
  types_or: [python, shell]
  pass_filenames: true

- id: no-terminal-file-io-redirect
  name: Block terminal file I/O redirection in shell scripts
  language: pygrep
  entry: '>>?\s+[a-zA-Z0-9_./~-]+|\|\s+(tee|cat\s+>>)\s+[a-zA-Z0-9_./~-]+'
  types: [shell]
  pass_filenames: true
