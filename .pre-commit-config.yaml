repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: validate-synthesis
        name: Validate synthesis documents
        entry: python3 scripts/validate_synthesis.py
        language: system
        types: [markdown]
        files: ^docs/research/
        exclude: ^docs/research/(OPEN_RESEARCH\.md|README\.md|.+/README\.md|sources/)
        pass_filenames: true
      - id: validate-agent-files
        name: Validate agent files
        entry: python3 scripts/validate_agent_files.py --all
        language: system
        files: ^\.github/agents/.*\.agent\.md$
        pass_filenames: false
      - id: validate-skill-files
        name: Validate skill files
        entry: python3 scripts/validate_agent_files.py --skills
        language: system
        files: ^\.github/skills/.*/SKILL\.md$
        pass_filenames: false
      - id: detect-drift
        name: Check value-encoding drift in agent files
        entry: python3 scripts/detect_drift.py --agents-dir .github/agents/ --format summary --fail-below 0.1
        language: system
        files: ^\.github/agents/.*\.agent\.md$
        pass_filenames: false
      - id: fast-tests
        name: Fast pytest (not slow, not integration)
        entry: uv run pytest tests/ -x -m "not slow and not integration" -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: check-doc-links
        name: Check relative file links in Markdown docs
        entry: python3 scripts/check_doc_links.py
        language: system
        types: [markdown]
        files: ^(docs/(?!research/sources/).*\.md|README\.md|CONTRIBUTING\.md|CHANGELOG\.md)$
        pass_filenames: true
      - id: no-heredoc-writes
        name: Block heredoc file-write commands (use create_file / replace_string_in_file tools instead)
        language: pygrep
        entry: 'cat\s+>{1,2}\s+\S+\s+<<|<<\s+[''"]?(EOF|PYEOF|HEREDOC)[''"]?'
        types_or: [python, shell]
        exclude: scripts/validate_agent_files\.py|tests/test_validate_agent_files\.py
        pass_filenames: true
      - id: no-terminal-file-io-redirect
        name: Block terminal file I/O redirection in shell scripts (use create_file / replace_string_in_file tools instead)
        language: pygrep
        entry: '>>?\s+[a-zA-Z0-9_./~-]+|\|\s+(tee|cat\s+>>)\s+[a-zA-Z0-9_./~-]+'
        types: [shell]
        exclude: scripts/validate_agent_files\.py|tests/test_validate_agent_files\.py
        pass_filenames: true
      - id: stale-github-repo-urls
        name: Block stale GitHub repo URLs from pre-rename fork (EndogenAI/Workflows)
        language: pygrep
        entry: 'EndogenAI/Workflows'
        types_or: [markdown, python, yaml]
        exclude: '^\.(pre-commit-config\.yaml|lycheeignore)$'
        pass_filenames: true